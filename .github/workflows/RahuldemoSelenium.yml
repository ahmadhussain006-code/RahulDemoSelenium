name: Rahul Demo Selenium Cross Browser Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  cross-browser-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest pytest-html webdriver-manager

      - name: Create output directories
        run: |
          mkdir -p screenshots
          mkdir -p reports

      - name: Run Selenium tests on ${{ matrix.browser }}
        run: |
          pytest test_selectdropdown.py \
            -s -v \
            --browser=${{ matrix.browser }} \
            --html=reports/report-${{ matrix.browser }}.html \
            --self-contained-html \
            --log-cli-level=INFO \
            --log-cli-format="%(asctime)s [%(levelname)s] %(message)s"

      - name: Upload HTML report for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/report-${{ matrix.browser }}.html
          if-no-files-found: ignore

      - name: Upload screenshots for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload failure screenshot for ${{ matrix.browser }}
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot-${{ matrix.browser }}
          path: screenshots/failure_${{ matrix.browser }}.png
          if-no-files-found: ignoregit